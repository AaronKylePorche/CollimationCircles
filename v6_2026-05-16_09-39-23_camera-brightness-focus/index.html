<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Collimation Circles</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="viewer" aria-label="Camera view">
        <video id="camera" autoplay playsinline muted></video>
        <div id="overlay" class="overlay" aria-hidden="true"></div>
        <div id="cameraStatus" class="camera-status">Camera not started</div>
      </section>

      <aside class="controls" aria-label="Circle controls">
        <header class="controls-header">
          <h1>Collimation Circles</h1>
          <button id="startCamera" type="button">Start Camera</button>
        </header>

        <label class="camera-picker">
          <span>Camera</span>
          <select id="cameraSelect" disabled>
            <option value="">Start camera to detect devices</option>
          </select>
        </label>

        <section class="camera-controls" aria-label="Camera controls">
          <h2>Camera Controls</h2>

          <label class="control-row">
            <span>Brightness</span>
            <input id="brightnessControl" type="range" disabled>
            <span id="brightnessValue" class="size-value">--</span>
          </label>

          <label class="control-row">
            <span>Focus</span>
            <input id="focusControl" type="range" disabled>
            <span id="focusValue" class="size-value">--</span>
          </label>
        </section>

        <div id="circleControls" class="circle-controls"></div>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
